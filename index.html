// ─── Parse .bloxdschem (Avro format) ────────────────────────────────────────
function readVarInt(buf, offset) {
  let value = 0, shift = 0;
  while (true) {
    const byte = buf[offset++];
    value |= (byte & 0x7F) << shift;
    shift += 7;
    if (!(byte & 0x80)) break;
  }
  return { value, offset };
}

function readZigZag(buf, offset) {
  const r = readVarInt(buf, offset);
  const n = r.value;
  return { value: (n >>> 1) ^ -(n & 1), offset: r.offset };
}

function readString(buf, offset) {
  const len = readZigZag(buf, offset);  // Avro string lengths are zigzag-encoded
  offset = len.offset;
  const bytes = buf.slice(offset, offset + len.value);
  return { value: new TextDecoder().decode(bytes), offset: offset + len.value };
}

function readBytes(buf, offset) {
  const len = readVarInt(buf, offset);
  offset = len.offset;
  return { value: buf.slice(offset, offset + len.value), offset: offset + len.value };
}

function parseBloxdschem(buf) {
  let offset = 0;

  // The .bloxdschem has a 4-byte header fixed field, then the data
  // Schema (i): headers(fixed4), name(string), x,y,z,sizeX,sizeY,sizeZ(int),
  //             chunks(array of {x,y,z,blocks(bytes)}), blockdatas(...), globalX,Y,Z, wtvthisis(fixed2)
  // We decode using the resolver: reads as schema (a): name,x,y,z,sizeX,sizeY,sizeZ,chunks

  // Skip 4-byte header
  offset += 4;

  const nameR = readString(buf, offset); offset = nameR.offset;
  const xR = readZigZag(buf, offset); offset = xR.offset;
  const yR = readZigZag(buf, offset); offset = yR.offset;
  const zR = readZigZag(buf, offset); offset = zR.offset;
  const sizeXR = readZigZag(buf, offset); offset = sizeXR.offset;
  const sizeYR = readZigZag(buf, offset); offset = sizeYR.offset;
  const sizeZR = readZigZag(buf, offset); offset = sizeZR.offset;

  // Read chunks array: Avro arrays use block-count encoding
  const chunks = [];
  while (true) {
    const countR = readZigZag(buf, offset); offset = countR.offset;
    const count = countR.value;
    if (count === 0) break;
    const n = count < 0 ? -count : count;
    if (count < 0) { const sizeR = readVarInt(buf, offset); offset = sizeR.offset; }
    for (let i = 0; i < n; i++) {
      const cxR = readZigZag(buf, offset); offset = cxR.offset;
      const cyR = readZigZag(buf, offset); offset = cyR.offset;
      const czR = readZigZag(buf, offset); offset = czR.offset;
      const blocksR = readBytes(buf, offset); offset = blocksR.offset;
      chunks.push({ x: cxR.value, y: cyR.value, z: czR.value, blocks: blocksR.value });
    }
  }

  return {
    name: nameR.value,
    pos: [xR.value, yR.value, zR.value],
    size: [sizeXR.value, sizeYR.value, sizeZR.value],
    chunks
  };
}

// ─── Decode RLE block data from each chunk ──────────────────────────────────
function decodeChunkBlocks(rawBlocks) {
  const decoded = [];
  let l = 0;
  function readVarIntLocal() {
    let v = 0, e = 0;
    while (true) {
      const r = rawBlocks[l++];
      v |= (r & 127) << e;
      e += 7;
      if (!(r & 0x80)) break;
    }
    return v;
  }
  while (l < rawBlocks.length) {
    const count = readVarIntLocal();
    const blockId = readVarIntLocal();
    for (let i = 0; i < count; i++) decoded.push(blockId);
  }
  return decoded;
}

// ─── Convert bloxd block ID → MC legacy numeric ID ──────────────────────────
function bloxdIdToLegacy(bloxdId) {
  const name = ID2NAME[bloxdId];
  if (!name || name === 'Air') return 0;
  const mcName = B2M[name];
  if (!mcName) return 0;
  return MC_NAME_TO_LEGACY_ID[mcName] ?? 0;
}

// ─── Build 3D block array from chunks ───────────────────────────────────────
function buildBlockArray(parsed) {
  const [sX, sY, sZ] = parsed.size;
  const [originX, originY, originZ] = parsed.pos;
  const totalBlocks = sX * sY * sZ;
  const blocks = new Uint8Array(totalBlocks);   // block IDs
  const data   = new Uint8Array(totalBlocks);   // block data (all 0)

  for (const chunk of parsed.chunks) {
    const rawDecoded = decodeChunkBlocks(chunk.blocks);
    // Chunk coords in 32-block units (absolute world space)
    const cxBase = chunk.x * 32;
    const cyBase = chunk.y * 32;
    const czBase = chunk.z * 32;

    for (let lx = 0; lx < 32; lx++) {
      for (let ly = 0; ly < 32; ly++) {
        for (let lz = 0; lz < 32; lz++) {
          const chunkIdx = lx * 1024 + ly * 32 + lz;
          const bloxdId = rawDecoded[chunkIdx] ?? 0;

          // Convert absolute world coords → schematic-local coords by subtracting origin
          const wx = cxBase + lx - originX;
          const wy = cyBase + ly - originY;
          const wz = czBase + lz - originZ;

          if (wx < 0 || wy < 0 || wz < 0 || wx >= sX || wy >= sY || wz >= sZ) continue;

          // .schematic format index: y*length*width + z*width + x
          const schIdx = wy * sZ * sX + wz * sX + wx;
          blocks[schIdx] = bloxdIdToLegacy(bloxdId);
        }
      }
    }
  }
  return { blocks, data };
}

// ─── Write NBT for legacy MCEdit .schematic ──────────────────────────────────
// NBT tag types
const TAG = { END:0, BYTE:1, SHORT:2, INT:3, LONG:4, FLOAT:5, DOUBLE:6,
              BYTE_ARRAY:7, STRING:8, LIST:9, COMPOUND:10, INT_ARRAY:11 };

function writeNBT(name, type, value) {
  const nameBuf = encodeString(name);
  const payload = encodePayload(type, value);
  const out = new Uint8Array(1 + nameBuf.length + payload.length);
  out[0] = type;
  out.set(nameBuf, 1);
  out.set(payload, 1 + nameBuf.length);
  return out;
}

function encodeString(str) {
  const encoded = new TextEncoder().encode(str);
  const buf = new Uint8Array(2 + encoded.length);
  buf[0] = (encoded.length >> 8) & 0xff;
  buf[1] = encoded.length & 0xff;
  buf.set(encoded, 2);
  return buf;
}

function encodePayload(type, value) {
  switch (type) {
    case TAG.BYTE: { const b = new Uint8Array(1); b[0] = value & 0xff; return b; }
    case TAG.SHORT: { const b = new Uint8Array(2); new DataView(b.buffer).setInt16(0, value, false); return b; }
    case TAG.INT: { const b = new Uint8Array(4); new DataView(b.buffer).setInt32(0, value, false); return b; }
    case TAG.STRING: return encodeString(value);
    case TAG.BYTE_ARRAY: {
      const len = new Uint8Array(4);
      new DataView(len.buffer).setInt32(0, value.length, false);
      const b = new Uint8Array(4 + value.length);
      b.set(len); b.set(value, 4);
      return b;
    }
    case TAG.LIST: {
      // value = { type, items[] }
      const itemType = value.type;
      const items = value.items;
      const header = new Uint8Array(5);
      header[0] = itemType;
      new DataView(header.buffer).setInt32(1, items.length, false);
      const parts = [header];
      for (const item of items) parts.push(encodePayload(itemType, item));
      return concat(parts);
    }
    case TAG.COMPOUND: {
      // value = array of {name, type, value}
      const parts = [];
      for (const tag of value) parts.push(writeNBT(tag.name, tag.type, tag.value));
      parts.push(new Uint8Array([TAG.END])); // end tag
      return concat(parts);
    }
    default: throw new Error('Unknown NBT type: ' + type);
  }
}

function concat(arrays) {
  const total = arrays.reduce((s, a) => s + a.length, 0);
  const out = new Uint8Array(total);
  let offset = 0;
  for (const a of arrays) { out.set(a, offset); offset += a.length; }
  return out;
}

function buildSchematicNBT(width, height, length, blocks, data, name) {
  // Clamp dimensions to signed short range (max 32767) — setInt16 silently overflows otherwise
  const w = Math.min(width,  32767);
  const h = Math.min(height, 32767);
  const l = Math.min(length, 32767);

  // Root compound tag named "Schematic"
  const rootPayload = encodePayload(TAG.COMPOUND, [
    { name: "Width",        type: TAG.SHORT,      value: w },
    { name: "Height",       type: TAG.SHORT,      value: h },
    { name: "Length",       type: TAG.SHORT,      value: l },
    { name: "Materials",    type: TAG.STRING,     value: "Alpha" },
    { name: "Blocks",       type: TAG.BYTE_ARRAY, value: blocks },
    { name: "Data",         type: TAG.BYTE_ARRAY, value: data },
    { name: "Entities",     type: TAG.LIST,       value: { type: TAG.COMPOUND, items: [] } },
    { name: "TileEntities", type: TAG.LIST,       value: { type: TAG.COMPOUND, items: [] } },
  ]);

  const rootName = encodeString("Schematic");
  const out = new Uint8Array(1 + rootName.length + rootPayload.length);
  out[0] = TAG.COMPOUND;
  out.set(rootName, 1);
  out.set(rootPayload, 1 + rootName.length);
  return out;
}

// ─── GZip compress ───────────────────────────────────────────────────────────
async function gzipCompress(data) {
  const stream = new CompressionStream('gzip');
  const writer = stream.writable.getWriter();
  writer.write(data);
  writer.close();
  const chunks = [];
  const reader = stream.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  return concat(chunks);
}

// ─── Download helper ─────────────────────────────────────────────────────────
function downloadBin(data, filename) {
  const blob = new Blob([data], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ─── Main entry ──────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const status = document.getElementById('status');
  const err = document.getElementById('err');
  err.textContent = '';
  status.textContent = 'Reading file...';

  const file = e.target.files[0];
  if (!file) return;

  const baseName = file.name.replace(/\.bloxdschem$/i, '');

  try {
    const arrayBuffer = await file.arrayBuffer();
    const buf = new Uint8Array(arrayBuffer);

    status.textContent = 'Parsing .bloxdschem...';
    const parsed = parseBloxdschem(buf);
    const [sX, sY, sZ] = parsed.size;
    console.log('Parsed:', parsed.name, 'size:', sX, sY, sZ, 'chunks:', parsed.chunks.length);

    status.textContent = 'Building block array...';
    const { blocks, data } = buildBlockArray(parsed);

    status.textContent = 'Writing .schematic NBT...';
    const nbtRaw = buildSchematicNBT(sX, sY, sZ, blocks, data, parsed.name);

    status.textContent = 'Compressing...';
    const compressed = await gzipCompress(nbtRaw);

    status.textContent = 'Downloading...';
    downloadBin(compressed, `${baseName}.schematic`);
    status.textContent = `✓ Done! Saved as ${baseName}.schematic`;
  } catch (ex) {
    status.textContent = '';
    err.textContent = 'Error: ' + ex.message;
    console.error(ex);
  }
});
</script>
